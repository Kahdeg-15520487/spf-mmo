name: Build & Publish OSRM Vietnam Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spf-osrm-vietnam
  OSM_URL: https://download.geofabrik.de/asia/vietnam-latest.osm.pbf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Vietnam OSM
        run: |
          mkdir -p osrm/osrm-data
          curl -L --retry 3 -o osrm/osrm-data/vietnam-latest.osm.pbf "$OSM_URL"
          ls -lh osrm/osrm-data/

      - name: Extract
        run: |
          docker run --rm -v ${{ github.workspace }}/osrm/osrm-data:/data osrm/osrm-backend:latest osrm-extract -p /opt/car.lua /data/vietnam-latest.osm.pbf

      - name: Partition
        run: |
          docker run --rm -v ${{ github.workspace }}/osrm/osrm-data:/data osrm/osrm-backend:latest osrm-partition /data/vietnam-latest.osrm

      - name: Customize
        run: |
          docker run --rm -v ${{ github.workspace }}/osrm/osrm-data:/data osrm/osrm-backend:latest osrm-customize /data/vietnam-latest.osrm

      - name: Verify files
        run: ls -lh osrm/osrm-data/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./osrm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
