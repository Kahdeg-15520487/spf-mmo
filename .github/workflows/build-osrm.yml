name: Build & Publish OSRM Vietnam Image

on:
  push:
    paths:
      - '.github/workflows/build-osrm.yml'
      - 'osrm/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kahdeg-15520487/spf-osrm-vietnam
  OSM_URL: https://download.geofabrik.de/asia/vietnam-latest.osm.pbf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Vietnam OSM
        run: |
          curl -L --retry 3 -o osrm/vietnam-latest.osm.pbf "$OSM_URL"
          ls -lh osrm/vietnam-latest.osm.pbf

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./osrm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
