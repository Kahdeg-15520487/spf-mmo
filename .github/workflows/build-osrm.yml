name: Build & Publish OSRM Vietnam Image

on:
  push:
    branches: [master]
    paths:
      - 'osrm/**'
      - '.github/workflows/build-osrm.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spf-osrm-vietnam
  OSM_URL: https://download.geofabrik.de/asia/vietnam-latest.osm.pbf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Vietnam OSM data
        run: |
          mkdir -p osrm/osrm-data
          curl -L --retry 3 -o osrm/osrm-data/vietnam-latest.osm.pbf "$OSM_URL"
          ls -lh osrm/osrm-data/

      - name: Extract OSM data
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/osrm/osrm-data:/data \
            osrm/osrm-backend:latest \
            osrm-extract -p /opt/car.lua /data/vietnam-latest.osm.pbf

      - name: Partition graph
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/osrm/osrm-data:/data \
            osrm/osrm-backend:latest \
            osrm-partition /data/vietnam-latest.osm.pbf

      - name: Customize weights
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/osrm/osrm-data:/data \
            osrm/osrm-backend:latest \
            osrm-customize /data/vietnam-latest.osm.pbf

      - name: Show processed files
        run: ls -lh osrm/osrm-data/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./osrm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=OSRM routing server with Vietnam map data
