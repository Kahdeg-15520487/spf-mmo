# OSRM routing — pull pre-built image from ghcr
services:
  osrm:
    image: ghcr.io/kahdeg-15520487/spf-osrm-vietnam:latest
    container_name: spf-osrm
    ports:
      - "13114:5000"
    entrypoint: ["osrm-routed", "--algorithm", "mld", "--threads", "8", "/data/vietnam-latest.osrm"]
    mem_limit: 4g
    restart: unless-stopped
