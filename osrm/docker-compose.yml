# OSRM self-hosted routing for SPF MMO
# Port 5000 — internal routing API

services:
  osrm:
    image: osrm/osrm-backend:latest
    container_name: spf-osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "
      if [ ! -f /data/vietnam-latest.osm.pbf ]; then
        echo 'Downloading Vietnam OSM data (~100MB)...';
        wget -q https://download.geofabrik.de/asia/vietnam-latest.osm.pbf -O /data/vietnam-latest.osm.pbf;
      fi;
      if [ ! -f /data/vietnam-latest.osrm ]; then
        echo 'Processing OSM data (this takes 2-5 min)...';
        osrm-extract -p /opt/car.lua /data/vietnam-latest.osm.pbf;
        osrm-partition /data/vietnam-latest.osm.pbf;
        osrm-customize /data/vietnam-latest.osm.pbf;
        echo 'OSRM ready!';
      fi;
      echo 'Starting OSRM routing server on port 5000...';
      osrm-routed --algorithm mld /data/vietnam-latest.osm.pbf
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/route/v1/driving/106.7,10.78;106.69,10.77"]
      interval: 30s
      timeout: 5s
      retries: 3
