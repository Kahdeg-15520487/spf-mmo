# -- Number of replicas (server MUST be 1 — SQLite)
replicaCount: 1

# -- Domain for Traefik IngressRoute
domain: spf.minhnguyenle.net

osrm:
  # OSRM deployed separately in osrm namespace — disable Helm-managed OSRM
  enabled: false

server:
  image:
    repository: ghcr.io/kahdeg-15520487/spf-server
    tag: latest
    pullPolicy: Always
  port: 13110
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # -- OSRM service URL (external, managed in osrm namespace)
  osrmUrl: http://osrm-vietnam.osrm.svc.homelab.cluster:5000
  # -- SQLite persistent storage
  persistence:
    size: 1Gi
    storageClass: ""

client:
  image:
    repository: ghcr.io/kahdeg-15520487/spf-client
    tag: latest
    pullPolicy: Always
  port: 13112
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
